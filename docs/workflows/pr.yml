name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Type check + lint + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client (no DB needed)
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint
        continue-on-error: true # Phase 6 will fix existing lint errors

      - name: Run unit tests (skip integration)
        run: npx vitest run --exclude '**/*.integration.test.ts'
