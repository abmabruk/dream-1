version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-patch:
        update-types: ["minor", "patch"]
        exclude-patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@prisma/*"
          - "prisma"
      majors:
        update-types: ["major"]
    ignore:
      - dependency-name: typescript
        versions: [">=6.0.0"]
      - dependency-name: eslint
        versions: [">=10.0.0"]
